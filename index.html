<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal DPMA IPB - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ipb-blue: #003366;
            --ipb-light-blue: #004d99;
            --ipb-yellow: #F2A900;
            --bg-color: #f4f7f6;
            --text-main: #333;
            --white: #ffffff;
            --error: #e74c3c;
            --success: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Pattern */
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--ipb-blue) 0%, #001a33 100%);
            z-index: -1;
        }

        .login-container {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(0);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-width: 250px;
            height: auto;
        }

        h2 {
            color: var(--ipb-blue);
            text-align: center;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--ipb-blue);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        button.btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--ipb-blue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button.btn-primary:hover {
            background-color: var(--ipb-light-blue);
        }

        button.btn-primary:active {
            transform: scale(0.98);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .toggle-form span {
            color: var(--ipb-blue);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-form span:hover {
            color: var(--ipb-yellow);
        }

        /* Custom Alert System */
        .alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .custom-alert {
            min-width: 300px;
            padding: 16px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards, fadeOut 0.5s 4.5s forwards;
            opacity: 0;
            transform: translateX(100%);
        }

        .custom-alert.success { background-color: var(--success); }
        .custom-alert.error { background-color: var(--error); }
        .custom-alert.info { background-color: var(--ipb-blue); }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    <div class="alert-container" id="alertBox"></div>

    <div class="login-container">
        <div class="logo-container">
            <img src="logo LP2AI - biru.png" alt="Logo DPMA IPB">
        </div>

        <div id="formSection">
            <h2 id="formTitle">Masuk ke Portal</h2>
            <p class="subtitle" id="formSubtitle">Sistem Blasting LP2AI IPB</p>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@apps.ipb.ac.id">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="btnText">Masuk</span>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </form>

    <script>
        // INISIALISASI SUPABASE
const supabaseUrl = 'https://taatrpyaeafoisykizav.supabase.co'; // GANTI INI
const supabaseKey = 'sb_publishable_TSppcNOP407bDmGg_3tGbA_kW-YdLPR'; // GANTI INI

// UBAH NAMA VARIABEL MENJADI supabaseClient
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let isLoginMode = true;

// UI Toggles
function toggleMode() {
    isLoginMode = !isLoginMode;
    const title = document.getElementById('formTitle');
    const btnText = document.getElementById('btnText');
    const toggleText = document.getElementById('toggleText');

    if (isLoginMode) {
        title.innerText = "Masuk ke Portal";
        btnText.innerText = "Masuk";
        toggleText.innerHTML = 'Belum punya akses? <span onclick="toggleMode()">Buat Akun</span>';
    } else {
        title.innerText = "Registrasi Akses";
        btnText.innerText = "Daftar Akun";
        toggleText.innerHTML = 'Sudah punya akses? <span onclick="toggleMode()">Masuk di sini</span>';
    }
}

// Custom Alert System
function showAlert(message, type = 'info') {
    const alertBox = document.getElementById('alertBox');
    const alertEl = document.createElement('div');
    alertEl.className = `custom-alert ${type}`;
    alertEl.innerHTML = `
        <span>${message}</span>
        <span style="cursor:pointer; font-weight:bold;" onclick="this.parentElement.remove()">×</span>
    `;
    alertBox.appendChild(alertEl);
    
    setTimeout(() => {
        if(alertEl.parentElement) alertEl.remove();
    }, 5000);
}

// Button Loading State
function setLoading(isLoading) {
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('btnLoader');
    const btn = document.getElementById('submitBtn');

    if (isLoading) {
        btnText.style.display = 'none';
        loader.style.display = 'block';
        btn.disabled = true;
    } else {
        btnText.style.display = 'block';
        loader.style.display = 'none';
        btn.disabled = false;
    }
}

// Check Session on Load
async function checkSession() {
    // Ubah pemanggilan menjadi supabaseClient
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        window.location.href = 'blasting.html';
    }
}
checkSession();

// Main Auth Handler
async function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    setLoading(true);

    try {
        if (isLoginMode) {
            // LOGIN PROCESS - Ubah pemanggilan menjadi supabaseClient
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) throw error;
            
            showAlert('Berhasil masuk! Mengalihkan...', 'success');
            setTimeout(() => {
                window.location.href = 'blasting.html';
            }, 1000);

        } else {
            // REGISTER PROCESS - Ubah pemanggilan menjadi supabaseClient
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
            });

            if (error) throw error;

            showAlert('Akun berhasil dibuat! Silakan masuk.', 'success');
            toggleMode(); 
        }
    } catch (error) {
        showAlert(`Gagal: ${error.message}`, 'error');
    } finally {
        setLoading(false);
    }
}
    </script>
</body>
</html>
